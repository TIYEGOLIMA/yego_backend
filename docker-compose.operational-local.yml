services:
  postgres:
    image: postgres:16-alpine
    container_name: yego-operational-local-postgres
    restart: unless-stopped
    ports:
      - "${OPERATIONAL_LOCAL_DB_PORT:-54329}:5432"
    environment:
      POSTGRES_DB: ${OPERATIONAL_LOCAL_DB_NAME:-yego_operational_local}
      POSTGRES_USER: ${OPERATIONAL_LOCAL_DB_USER:-yego_local}
      POSTGRES_PASSWORD: ${OPERATIONAL_LOCAL_DB_PASSWORD:-yego_local}
    volumes:
      - yego_operational_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPERATIONAL_LOCAL_DB_USER:-yego_local} -d ${OPERATIONAL_LOCAL_DB_NAME:-yego_operational_local}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  yego_operational_local_pgdata:
