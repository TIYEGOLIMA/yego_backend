# Configuración JWT directa - SIN PERFILES
jwt.secret=YegoBackendSecretKey2024VerySecureAndLongEnoughForHS512AlgorithmWithAtLeast64Characters
jwt.expiration=604800
jwt.device-expiration=${JWT_DEVICE_EXPIRATION_SECONDS:2592000}

# Usuarios excluidos de la política de cambio de contraseña semanal (IDs separados por coma).
auth.password-policy.excluded-user-ids=1,4,5,6,27,37
# false = no pedir cambio periódico por antigüedad (≥7 días). true = política activa.
auth.password-policy.weekly-renewal-enabled=false
auth.password.bcrypt-strength=${AUTH_PASSWORD_BCRYPT_STRENGTH:12}
auth.registration.default-role=${AUTH_REGISTRATION_DEFAULT_ROLE:USER}

# Base de datos
spring.datasource.url=jdbc:postgresql://168.119.226.236:5432/yego_integral
spring.datasource.username=yego_user
spring.datasource.password=37>MNA&-35+
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - SIN VALIDACIÓN
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.open-in-view=false

# Perfil seguro por defecto. En producción iniciar con --spring.profiles.active=prod.
spring.profiles.default=dev

# Servidor
server.port=3030
# Apagado ordenado: libera el puerto antes (útil con DevTools / reinicios seguidos).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s
# Si aún falla con "BindException / dirección ya se está usando": otro Java usa 3030.
# Libera con: fuser -k 3030/tcp  (o cierra la otra terminal con spring-boot:run)

# Forzar UTF-8 en todas las respuestas HTTP (ñ, acentos, etc.)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# Configuración de tamaño máximo de archivos
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB


# Logging básico
logging.level.com.yego.backend=INFO
# Los errores HTTP esperados (401/403/404) ya se convierten a JSON por GlobalApiExceptionHandler.
# Evita que Spring los registre como WARN en cada solicitud inválida o sesión expirada.
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
# La aplicación registra deliberadamente un DaoAuthenticationProvider propio.
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# Orígenes CORS separados por coma. Definir únicamente dominios HTTPS confiables en producción.
security.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://integral.yego.pro,https://api-int.yego.pro,https://neto.yego.pro,https://siscoca.yego.pro,https://ct4.yego.pro,http://5.161.86.63,http://5.161.86.63:*,https://5.161.86.63,https://5.161.86.63:*

# Deshabilitar stack trace en respuestas de error
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Configuración Yango Pro Ops - Rotación de Proxies
# Habilitar rotación de proxies para evitar bloqueos de la API
yego.pro-ops.proxy.enabled=true
# Lista de proxies: se obtiene desde Webshare (no es necesario proxies.txt)
# URL Webshare: actualización cada 5 horas (formato una línea por proxy: IP:PORT:USER:PASS)
yego.pro-ops.proxy.webshare-url=${YEGO_PRO_OPS_WEBSHARE_URL:}
# Refresco: primera ejecución a los 5 segundos, luego cada 5 horas
yego.pro-ops.proxy.refresh-initial-delay-ms=5000
yego.pro-ops.proxy.refresh-interval-ms=18000000
