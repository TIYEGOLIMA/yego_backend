# Configuración JWT directa - SIN PERFILES
jwt.secret=YegoBackendSecretKey2024VerySecureAndLongEnoughForHS512AlgorithmWithAtLeast64Characters
jwt.expiration=604800

# Usuarios excluidos de la política de cambio de contraseña semanal (IDs separados por coma). Ej: 1,4,5,6
auth.password-policy.excluded-user-ids=1,4,5,6

# Base de datos
spring.datasource.url=jdbc:postgresql://168.119.226.236:5432/yego_integral
spring.datasource.username=yego_user
spring.datasource.password=37>MNA&-35+
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - SIN VALIDACIÓN
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none

# Servidor
server.port=3030

# Forzar UTF-8 en todas las respuestas HTTP (ñ, acentos, etc.)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# Configuración de tamaño máximo de archivos
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB


# Logging básico
logging.level.com.yego.backend=INFO

# Deshabilitar stack trace en respuestas de error
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=false

# Perfil activo - IMPORTANTE para WebSocket
# En producción debe ser: spring.profiles.active=prod
# En desarrollo: spring.profiles.active=dev (o comentar esta línea)
# NOTA: Comentado para usar el perfil por defecto (dev) o el que se pase como argumento
# spring.profiles.active=prod

# Configuración Yango Pro Ops - Rotación de Proxies
# Habilitar rotación de proxies para evitar bloqueos de la API
yego.pro-ops.proxy.enabled=true
# Lista de proxies: se obtiene desde Webshare (no es necesario proxies.txt)
# URL Webshare: actualización cada 5 horas (formato una línea por proxy: IP:PORT:USER:PASS)
yego.pro-ops.proxy.webshare-url=https://proxy.webshare.io/api/v2/proxy/list/download/kqqbnmtybqubwyebpnzxicsgnsxuqgujgwljqowo/-/any/username/direct/-/?plan_id=12298298
# Refresco: primera ejecución a los 5 segundos, luego cada 5 horas
yego.pro-ops.proxy.refresh-initial-delay-ms=5000
yego.pro-ops.proxy.refresh-interval-ms=18000000

# Conductores en orden por WebSocket: cada cuánto se actualiza y se envía al front (solo si hay usuarios con pro-ops conectados)
# Valor en ms. Ej: 300000 = 5 min, 60000 = 1 min (más actualizado, más carga en API Yango)
yego.pro-ops.conductores-en-orden-ws.initial-delay-ms=60000
yego.pro-ops.conductores-en-orden-ws.fixed-delay-ms=300000