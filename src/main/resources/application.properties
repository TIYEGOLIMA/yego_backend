# Configuración JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=604800
jwt.device-expiration=${JWT_DEVICE_EXPIRATION_SECONDS:604800}

# Usuarios excluidos de la política de cambio de contraseña semanal (IDs separados por coma).
auth.password-policy.excluded-user-ids=1,4,5,6,27,37
# false = no pedir cambio periódico por antigüedad (≥7 días). true = política activa.
auth.password-policy.weekly-renewal-enabled=false
auth.password.bcrypt-strength=${AUTH_PASSWORD_BCRYPT_STRENGTH:12}
auth.registration.default-role=${AUTH_REGISTRATION_DEFAULT_ROLE:USER}

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - SIN VALIDACIÓN
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Perfil seguro por defecto. En producción iniciar con --spring.profiles.active=prod.
spring.profiles.default=dev

# Servidor
server.port=3030
# Apagado ordenado: libera el puerto antes (útil con DevTools / reinicios seguidos).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s
# Si aún falla con "BindException / dirección ya se está usando": otro Java usa 3030.
# Libera con: fuser -k 3030/tcp  (o cierra la otra terminal con spring-boot:run)

# Forzar UTF-8 en todas las respuestas HTTP (ñ, acentos, etc.)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# Configuración de tamaño máximo de archivos
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB


# Logging básico
logging.level.com.yego.backend=INFO
# Los errores HTTP esperados (401/403/404) ya se convierten a JSON por GlobalApiExceptionHandler.
# Evita que Spring los registre como WARN en cada solicitud inválida o sesión expirada.
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
# La aplicación registra deliberadamente un DaoAuthenticationProvider propio.
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# Orígenes CORS separados por coma. Definir únicamente dominios HTTPS confiables en producción.
security.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://integral.yego.pro,https://api-int.yego.pro,https://neto.yego.pro,https://siscoca.yego.pro,https://ct4.yego.pro,http://5.161.86.63,http://5.161.86.63:*,https://5.161.86.63,https://5.161.86.63:*

# Deshabilitar stack trace en respuestas de error
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Configuración Yango Pro Ops - Rotación de Proxies
yego.pro-ops.park-id=64085dd85e124e2c808806f70d527ea8
yego.pro-ops.yango.vehicles-url=${YEGO_PRO_OPS_VEHICLES_URL:https://fleet.yango.com/api/fleet/vehicles-manager/v1/vehicles/list}
yego.pro-ops.yango.vehicle-details-url=${YEGO_PRO_OPS_VEHICLE_DETAILS_URL:https://fleet.yango.com/api/api/v1/cards/car/details}
yego.pro-ops.yango.qc-history-url=${YEGO_PRO_OPS_QC_HISTORY_URL:https://fleet.yango.com/api/fleet/fleet-quality-control/v2/rqc/history}
yego.pro-ops.yango.driver-points-url=${YEGO_PRO_OPS_DRIVER_POINTS_URL:https://fleet.yango.com/api/fleet/map/v2/drivers/points}
yego.pro-ops.yango.drivers-list-url=${YEGO_PRO_OPS_DRIVERS_LIST_URL:https://fleet.yango.com/api/fleet/map/v1/drivers/list}
yego.pro-ops.yango.contractors-url=${YEGO_PRO_OPS_CONTRACTORS_URL:https://fleet.yango.com/api/fleet/contractor-profiles-manager/v2/contractors/list}
yego.pro-ops.yango.driver-income-url=${YEGO_PRO_OPS_DRIVER_INCOME_URL:https://fleet.yango.com/api/v1/cards/driver/income}
yego.pro-ops.yango.driver-details-url=${YEGO_PRO_OPS_DRIVER_DETAILS_URL:https://fleet.yango.com/api/v1/cards/driver/details}
yego.pro-ops.yango.driver-common-url=${YEGO_PRO_OPS_DRIVER_COMMON_URL:https://fleet.yango.com/api/fleet/router/v1/cards/driver/common}
yego.pro-ops.yango.driver-transactions-list-url=${YEGO_PRO_OPS_DRIVER_TRANSACTIONS_URL:https://fleet.yango.com/api/v1/reports/transactions/driver/list}
yego.pro-ops.yango.goals-url-template=${YEGO_PRO_OPS_GOALS_URL_TEMPLATE:https://fleet.yango.com/api/fleet/v1/subvention-view/v1/goals?driver_profile_id=%s}
yego.pro-ops.yango.orders-url=${YEGO_PRO_OPS_ORDERS_URL:https://fleet.yango.com/api/reports-api/v1/orders/list}
yego.pro-ops.yango.suggestions-url=${YEGO_PRO_OPS_SUGGESTIONS_URL:https://fleet.yango.com/api/fleet/contractor-profiles-manager/v1/suggestions/list}
# Habilitar rotación de proxies para evitar bloqueos de la API
yego.pro-ops.proxy.enabled=true
# Lista de proxies: se obtiene desde Webshare (no es necesario proxies.txt)
# URL Webshare: actualización cada 5 horas (formato una línea por proxy: IP:PORT:USER:PASS)
yego.pro-ops.proxy.webshare-url=${YEGO_PRO_OPS_WEBSHARE_URL:}
# Refresco: primera ejecución a los 5 segundos, luego cada 5 horas
yego.pro-ops.proxy.refresh-initial-delay-ms=5000
yego.pro-ops.proxy.refresh-interval-ms=18000000
# Cookies separadas por |||. Configurarlas en el servicio del servidor, nunca en Git.
yego.yango.cookies=${YEGO_YANGO_COOKIES:}

# Integración de consulta DNI
factiliza.api-url=${FACTILIZA_API_URL:https://api.factiliza.com/pe/v1/dni/info}
factiliza.api-token=${FACTILIZA_API_TOKEN:}

# Yego Marketing: Evolution Go y Fleet
evolution-go.marketing.base-url=${EVOLUTION_GO_MARKETING_BASE_URL:https://go.yego.pro}
evolution-go.marketing.token=${EVOLUTION_GO_MARKETING_TOKEN:}
evolution-go.marketing.instance=${EVOLUTION_GO_MARKETING_INSTANCE:Yego_Marketing}
evolution-go.marketing.groups-path=${EVOLUTION_GO_MARKETING_GROUPS_PATH:/group/list}
evolution-go.marketing.delay-ms=${EVOLUTION_GO_MARKETING_DELAY_MS:1200}
marketing.fleet.api-url=${YEGO_MARKETING_FLEET_API_URL:https://fleet.yango.com/api/fleet/communications/v2/mailings}
marketing.fleet.cookie=${YEGO_MARKETING_FLEET_COOKIE:}
marketing.fleet.delay-ms=${YEGO_MARKETING_FLEET_DELAY_MS:5000}
marketing.scheduler.initial-delay-ms=${YEGO_MARKETING_INITIAL_DELAY_MS:60000}
marketing.scheduler.fixed-delay-ms=${YEGO_MARKETING_FIXED_DELAY_MS:300000}
marketing.delivery.max-attempts=${YEGO_MARKETING_MAX_ATTEMPTS:3}
marketing.delivery.retry-delay-seconds=${YEGO_MARKETING_RETRY_DELAY_SECONDS:60}
marketing.delivery.processing-timeout-seconds=${YEGO_MARKETING_PROCESSING_TIMEOUT_SECONDS:180}

# OTP app movil Pro Ops (Evolution GO)
mobile.otp.ttl-minutes=${MOBILE_OTP_TTL_MINUTES:1}
mobile.otp.log-code-enabled=${MOBILE_OTP_LOG_CODE_ENABLED:true}
mobile.app.min-version=${MOBILE_APP_MIN_VERSION:1.0.1}
mobile.otp.request-limit=${MOBILE_OTP_REQUEST_LIMIT:5}
mobile.otp.request-window-minutes=${MOBILE_OTP_REQUEST_WINDOW_MINUTES:10}
mobile.otp.block-minutes=${MOBILE_OTP_BLOCK_MINUTES:15}
mobile.otp.verify-fail-limit=${MOBILE_OTP_VERIFY_FAIL_LIMIT:5}
# Solo desarrollo local: permite validar OTP desde logs si falta token del proveedor.
mobile.otp.allow-log-only-without-provider=${MOBILE_OTP_ALLOW_LOG_ONLY_WITHOUT_PROVIDER:false}
evolution-go.base-url=${EVOLUTION_GO_BASE_URL:https://go.yego.pro}
evolution-go.otp.token=${EVOLUTION_GO_PRO_OPS_TOKEN:}
evolution-go.otp.delay-ms=${EVOLUTION_GO_WHATSAPP_DELAY_MS:1200}

# Conductores en orden por WebSocket: cada cuánto se actualiza y se envía al front (solo si hay usuarios con pro-ops conectados)
# Valor en ms. Ej: 300000 = 5 min, 60000 = 1 min (más actualizado, más carga en API Yango)
yego.pro-ops.conductores-en-orden-ws.initial-delay-ms=60000
yego.pro-ops.conductores-en-orden-ws.fixed-delay-ms=300000

# Runner interno protegido para validacion operacional
operational.monitoring.runner.enabled=false
operational.monitoring.runner.environment=unknown
operational.monitoring.runner.confirm-writes-to-operational-tables=false
operational.monitoring.runner.max-range-days=1
operational.monitoring.runner.default-driver-count=5
operational.monitoring.runner.max-driver-count=20
operational.monitoring.runner.use-manual-sample-selector=true
