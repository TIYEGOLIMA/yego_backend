evolution-go.otp.delay-ms=${EVOLUTION_GO_WHATSAPP_DELAY_MS:1200}

# Conductores en orden por WebSocket: cada cuánto se actualiza y se envía al front (solo si hay usuarios con pro-ops conectados)
# Valor en ms. Ej: 300000 = 5 min, 60000 = 1 min (más actualizado, más carga en API Yango)
yego.pro-ops.conductores-en-orden-ws.initial-delay-ms=60000
yego.pro-ops.conductores-en-orden-ws.fixed-delay-ms=300000

# Runner interno protegido para validacion operacional
operational.monitoring.runner.enabled=false
operational.monitoring.runner.environment=unknown
operational.monitoring.runner.confirm-writes-to-operational-tables=false
operational.monitoring.runner.max-range-days=1
operational.monitoring.runner.default-driver-count=5
operational.monitoring.runner.max-driver-count=20
operational.monitoring.runner.use-manual-sample-selector=true
