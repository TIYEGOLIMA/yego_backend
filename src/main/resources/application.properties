# OTP app movil Pro Ops (Evolution GO)
mobile.otp.ttl-minutes=${MOBILE_OTP_TTL_MINUTES:1}
mobile.otp.log-code-enabled=${MOBILE_OTP_LOG_CODE_ENABLED:false}
mobile.app.min-version=${MOBILE_APP_MIN_VERSION:1.0.0}
mobile.otp.request-limit=${MOBILE_OTP_REQUEST_LIMIT:5}
mobile.otp.request-window-minutes=${MOBILE_OTP_REQUEST_WINDOW_MINUTES:10}
mobile.otp.block-minutes=${MOBILE_OTP_BLOCK_MINUTES:15}
mobile.otp.verify-fail-limit=${MOBILE_OTP_VERIFY_FAIL_LIMIT:5}
