# =====================================================
# YEGO INTEGRAL - CONFIGURACIÓN DE PRODUCCIÓN
# =====================================================
# Basado en .env de producción

server:
  port: ${PORT:3030}

spring:
  # Configuración de zona horaria
  jackson:
    time-zone: America/Lima
    date-format: yyyy-MM-dd HH:mm:ss
  
  # Configuración de tamaño máximo de archivos
  servlet:
    multipart:
      max-file-size: 10MB  # Tamaño máximo por archivo (videos grandes)
      max-request-size: 10MB  # Tamaño máximo total de la petición
      enabled: true
      file-size-threshold: 2KB
  
  # Configuración de base de datos PostgreSQL - PRODUCCIÓN
  datasource:
    url: jdbc:postgresql://${DB_HOST:168.119.226.236}:${DB_PORT:5432}/${DB_NAME:yego_integral}
    username: ${DB_USER:yego_user}
    password: ${DB_PASSWORD:37>MNA&-35+}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 15000
      keepalive-time: 60000
  
  # JPA/Hibernate para producción - optimizado
  jpa:
    hibernate:
      ddl-auto: ${TYPEORM_SYNCHRONIZE:validate}  # false en .env = validate en Spring
    show-sql: ${TYPEORM_LOGGING:false}           # false en .env
    open-in-view: false  # Deshabilitar para mejor rendimiento
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 32
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# JWT para producción
jwt:
  secret: ${JWT_SECRET:cb0d12d0302705aba616440ca4f65dee7ec31810497a80e1b2e2e60b95c5437ea2aac09d4c2f8dd8f94c7899e2f6dcfde371182c6daa152cc8614f33f5be12ff}
  expiration: ${JWT_EXPIRES_IN:604800}  # 1 semana en producción

# Configuración de la aplicación para producción
app:
  system-version: ${SYSTEM_VERSION:}
  base-url: ${APP_BASE_URL:https://integral.yego.pro}
  frontend:
    url: ${FRONTEND_URL:https://integral.yego.pro}
    cors:
      origin-dev: ${CORS_ORIGIN_DEV:http://localhost:5173}
      origin-prod: ${CORS_ORIGIN_PROD:https://integral.yego.pro}
      origin-api: ${CORS_ORIGIN_API:https://api-int.yego.pro}
  
  # API Externa para DNI (producción)
  factiliza:
    api-url: ${FACTILIZA_API_URL:https://api.factiliza.com/pe/v1/dni/info}
    api-token: ${FACTILIZA_API_TOKEN:tu_token_aqui}
  
  # Configuración de seguridad para producción
  security:
    bcrypt-rounds: ${BCRYPT_ROUNDS:12}
    session-timeout: ${SESSION_TIMEOUT:3600}
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
  
  # Configuración de importaciones
  import:
    max-file-size: ${IMPORT_MAX_FILE_SIZE:10485760}
    allowed-extensions: ${IMPORT_ALLOWED_EXTENSIONS:csv,xlsx}
  
  # Rate Limiting para producción
  rate-limit:
    window-ms: ${RATE_LIMIT_WINDOW_MS:900000}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}

# Logging optimizado para producción
logging:
  level:
    com.yego.backend: ${LOG_LEVEL:info}
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
    org.hibernate.SQL: WARN
    # Suprimir warnings específicos de Spring Security
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/app.log}

# WebSocket para producción
websocket:
  port: ${SOCKET_PORT:3010}

# Swagger para producción
swagger:
  title: ${SWAGGER_TITLE:Yego Integral API}
  description: ${SWAGGER_DESCRIPTION:API del Sistema Yego Integral}
  version: ${SWAGGER_VERSION:1.0.0}

# Configuración de notificaciones para producción
notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
  smtp:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    user: ${SMTP_USER:notificaciones@yego.pro}
    password: ${SMTP_PASS:password_seguro_aqui}

# Actuator para producción - más restrictivo
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Configuración Yango Pro Ops - Rotación de Proxies
# Habilitar rotación de proxies para evitar bloqueos de la API
yego:
  pro-ops:
    proxy:
      enabled: true
      # Archivo de proxies (por defecto: proxies.txt en src/main/resources)
      # Formato: una línea por proxy: IP:PORT:USERNAME:PASSWORD
      file: proxies.txt

# WhatsApp API (Evolution API)
whatsapp:
  api:
    key: ${WHATSAPP_API_KEY:F6898E0C248E-4610-8C7C-61DAF4876CED}
    base-url: ${WHATSAPP_API_BASE_URL:https://wsp.yego.pro}
