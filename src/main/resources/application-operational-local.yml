server:
  port: ${OPERATIONAL_LOCAL_SERVER_PORT:3030}

spring:
  datasource:
    url: jdbc:postgresql://${OPERATIONAL_LOCAL_DB_HOST:localhost}:${OPERATIONAL_LOCAL_DB_PORT:54329}/${OPERATIONAL_LOCAL_DB_NAME:yego_operational_local}
    username: ${OPERATIONAL_LOCAL_DB_USER:yego_local}
    password: ${OPERATIONAL_LOCAL_DB_PASSWORD:yego_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

logging:
  level:
    com.yego.backend: INFO

operational:
  monitoring:
    runner:
      enabled: false
      environment: local
      confirm-writes-to-operational-tables: false
      max-range-days: 1
      default-driver-count: 5
      max-driver-count: 20
      use-manual-sample-selector: true
