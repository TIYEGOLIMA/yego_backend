# =====================================================
# YEGO INTEGRAL - CONFIGURACIÓN DE DESARROLLO
# =====================================================
# Basado en .env de desarrollo

server:
  port: ${PORT:3030}

spring:
  # Permitir referencias circulares (temporal para resolver dependencias)
  main:
    allow-circular-references: true

  # Configuración de tamaño máximo de archivos
  servlet:
    multipart:
      max-file-size: 10MB  # Tamaño máximo por archivo (videos grandes)
      max-request-size: 10MB  # Tamaño máximo total de la petición
      enabled: true
      file-size-threshold: 2KB

  datasource:
    url: jdbc:postgresql://${DB_HOST:168.119.226.236}:${DB_PORT:5432}/${DB_NAME:yego_integral_dev} #cambiar a yego_integral cuando este en produccion
    username: ${DB_USER:yego_user}
    password: ${DB_PASSWORD:37>MNA&-35+}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  # Hibernate para desarrollo
  jpa:
    hibernate:
      ddl-auto: ${TYPEORM_SYNCHRONIZE:update}  
    show-sql: ${TYPEORM_LOGGING:true}           
    open-in-view: false  # Deshabilitar para mejor rendimiento
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT para desarrollo
jwt:
  secret: ${JWT_SECRET:YegoBackendSecretKey2024VerySecureAndLongEnoughForHS512AlgorithmWithAtLeast64Characters}
  expiration: ${JWT_EXPIRES_IN:86400} 

# Configuración de la aplicación para desarrollo
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
    cors:
      origin: ${CORS_ORIGIN_DEV:*}  # Permitir todo en desarrollo
  
  
  # API Externa para DNI (desarrollo)
  factiliza:
    api-url: ${FACTILIZA_API_URL:https://api.factiliza.com/pe/v1/dni/info}
    api-token: ${FACTILIZA_API_TOKEN:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI2NTkiLCJodHRwOi8vc2NoZW1hcy5taWNyb3NvZnQuY29tL3dzLzIwMDgvMDYvaWRlbnRpdHkvY2xhaW1zL3JvbGUiOiJjb25zdWx0b3IifQ.NaoAXramusCzks7mRCzWFWcMiBaSA0d8rNBgw-OVeYg}
  
  # Configuración de seguridad para desarrollo
  security:
    bcrypt-rounds: ${BCRYPT_ROUNDS:12}
    session-timeout: ${SESSION_TIMEOUT:3600}
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
  
  # Configuración de importaciones
  import:
    max-file-size: ${IMPORT_MAX_FILE_SIZE:10485760}
    allowed-extensions: ${IMPORT_ALLOWED_EXTENSIONS:csv,xlsx}

# Logging más detallado para desarrollo
logging:
  level:
    com.yego.backend: ${LOG_LEVEL:debug}
    org.springframework.security: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.web: DEBUG
    # Suprimir warnings específicos de Spring Security
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/app.log}

# WebSocket para desarrollo
websocket:
  port: ${SOCKET_PORT:3000}

# Swagger para desarrollo
swagger:
  title: ${SWAGGER_TITLE:Yego Integral API}
  description: ${SWAGGER_DESCRIPTION:API del Sistema Yego Integral}
  version: ${SWAGGER_VERSION:1.0.0}

# Configuración de notificaciones para desarrollo
notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
  smtp:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    user: ${SMTP_USER:tu_email@gmail.com}
    password: ${SMTP_PASS:tu_password}
